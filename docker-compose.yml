services:
  vulncore:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vulncore
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - vulncore-data:/data
    environment:
      VULNCORE_ENV: production
      VULNCORE_PORT: "8080"
      # ── Auth (REQUIRED — change these) ──
      VULNCORE_USERNAME: admin
      VULNCORE_PASSWORD: changeme123
      VULNCORE_SECRET:   super-secret-key-change-this
      # ── Webhook (optional) ───────────────
      VULNCORE_WEBHOOK_URL: ""
      VULNCORE_WEBHOOK_MIN_SEVERITY: CRITICAL
      # ── Defaults ─────────────────────────
      VULNCORE_DEFAULT_TARGET: "127.0.0.1"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  vulncore-data:
    driver: local